<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
  <title>Planning</title>

  <link rel="stylesheet" href="./styles.css?v=999" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">

  <script defer src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <script defer src="./app.js?v=999"></script>
</head>

<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>📅 Planning</h1>
      </div>

      <input id="search" class="search" placeholder="Rechercher… (titre, tag, source)" />

      <div id="status" class="status"></div>

      <div class="viewTitle" id="currentTitle"></div>

      <div class="navRow">
        <button id="prevBtn" class="btn small" title="Précédent">‹</button>
        <button id="todayBtn" class="btn small" title="Aujourd'hui">today</button>
        <button id="nextBtn" class="btn small" title="Suivant">›</button>
      </div>

      <div class="viewRow">
        <button class="btn pill" data-view="dayGridMonth">month</button>
        <button class="btn pill" data-view="timeGridWeek">week</button>
        <button class="btn pill" data-view="timeGridDay">day</button>
        <button class="btn pill" data-view="listYear">Total</button>
      </div>

      <div class="actionRow">
        <button id="refresh" class="btn primary">⟳ Sync</button>
        <button id="notif" class="btn primary">🔔 Notifications</button>
      </div>

      <div class="missedSection">
        <a
          class="missedHeader missedHeaderLink"
          href="https://docs.google.com/spreadsheets/d/1WuGg-AH0X1x5ZdOswZlwn5KxE-V0TKeYTxovN20E9UE/edit?gid=15026583#gid=15026583"
          target="_blank"
          rel="noopener noreferrer"
        >
          À rattraper
        </a>
        <div id="missedList" class="missedList"></div>
      </div>

      <div class="hint">
        Les notifications sont envoyées <b>une seule fois</b> au <b>début</b> d’un événement (tant que la page est ouverte).
      </div>
    </aside>

    <main class="main">
      <div id="calendar"></div>
    </main>
  </div>

  <noscript>Active JavaScript pour afficher le planning.</noscript>
</body>
</html>
